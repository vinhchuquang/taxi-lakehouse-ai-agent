name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  python-and-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip setuptools wheel && python -m pip install -e ".[dev]"

      - name: Run Python tests
        run: python -m pytest -p no:cacheprovider

      - name: Run release consistency checks
        run: python scripts/release_check.py
